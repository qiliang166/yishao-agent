<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食材清单 — 占位符模板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1a365d;
    --primary-rgb: 26, 54, 93;
    --accent: #e67e22;
    --accent-rgb: 230, 126, 34;
    --background: #ffffff;
    --background-rgb: 255, 255, 255;
    --text: #1a202c;
    --text-rgb: 26, 32, 44;
    --card_bg: #f0f4f8;
    --card_bg-rgb: 240, 244, 248;
    --chart-0: #1a365d;
    --chart-0-rgb: 26, 54, 93;
    --chart-1: #2c5282;
    --chart-1-rgb: 44, 82, 130;
  }
  body {
    background: #e8ecf1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .slide-wrapper {
    width: 794px;
    height: 1123px;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="slide-wrapper">

<div style="width:794px;height:1123px;display:flex;flex-direction:column;background:var(--background);font-family:Inter,'PingFang SC','Microsoft YaHei',sans-serif;position:relative;overflow:hidden;">

  <!-- ═══ 页头区 45px ═══ -->
  <div style="flex-shrink:0;height:45px;display:flex;align-items:center;font-size:10px;color:rgba(var(--text-rgb),0.45);border-bottom:1px solid rgba(var(--text-rgb),0.08);">
    <div style="flex:1;text-align:left;padding-left:60px;">出品标准文档 &middot; 食材清单</div>
    <div style="flex:1;text-align:left;">版本 2.0 / 2026-06-30</div>
    <div style="flex:1;text-align:left;">3 / 5</div>
  </div>

  <div style="flex:1;position:relative;overflow:hidden;">

    </svg>

    <div style="width:100%;height:4px;background:var(--accent);"></div>

    <table style="width:100%;border-collapse:collapse;font-size:12px;font-family:Inter,'PingFang SC','Microsoft YaHei',sans-serif;">
      <colgroup>
        <col style="width:40px"><col style="width:65px"><col style="width:110px"><col style="width:70px">
        <col style="width:149px"><col style="width:150px"><col style="width:45px"><col style="width:45px">
      </colgroup>
      <thead>
        <tr style="background:var(--chart-0);color:#ffffff;">
          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">序号</th>
          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">食材分类</th>
          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">名称</th>

          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">加工要求</th>
          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">重量</th>
          <th style="padding:9px 6px;border:1px solid rgba(var(--text-rgb),0.2);font-weight:600;">单位</th>
        </tr>
      </thead>
      <tbody>
        <tr style="background:rgba(var(--text-rgb),0.02);">
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">1</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">海鲜</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">鲍鱼</td>

          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
        </tr>
        <tr style="background:transparent;">

          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">干货</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">花胶</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">蒸醒与温浸发制至晶莹弹软</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">晶莹弹软</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
        </tr>
        <tr style="background:rgba(var(--text-rgb),0.02);">
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">3</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">禽类</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">凤爪</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">醋化处理并高温炸成虎皮</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">虎皮</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
        </tr>
        <tr style="background:transparent;">
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">4</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">干货</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">花菇</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">涨发后留汁提鲜</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">汁浓提鲜</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
        </tr>
        <tr style="background:rgba(var(--text-rgb),0.02);">
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">5</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">调辅料</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">大地鱼粉</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
          <td style="padding:8px 6px;border:1px solid rgba(var(--text-rgb),0.2);text-align:center;">—</td>
        </tr>
      </tbody>
    </table>
    </div>

  </div>

  <!-- ═══ 页尾区 45px ═══ -->
  <div style="flex-shrink:0;height:45px;display:flex;align-items:center;font-size:10px;color:rgba(var(--text-rgb),0.4);border-top:1px solid rgba(var(--text-rgb),0.08);">
    <div style="flex:1;text-align:left;padding-left:60px;">@智绘食谱教案系统</div>
    <div style="flex:1;text-align:left;">lql</div>
    <div style="flex:1;text-align:left;">第 3 页</div>
  </div>

</div>

</div>
</body>
</html>
