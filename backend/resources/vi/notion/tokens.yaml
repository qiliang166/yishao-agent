# Notion — Structured Clarity Design Tokens
# 程序解析用，所有色值/字号/间距的精确数值
# 颜色变量: {{primary}}, {{primary_rgb}}, {{accent}}, {{chart_0}}, 等

# 当前激活的色系（兼容字段）
color_scheme: notion-dark

# 文档模板映射 — 从 chart_colors 引用，避免破坏13色码结构
document_colors:
  header_blue: "{{chart_0}}"
  header_bronze: "{{chart_1}}"
  text_rgb: "55,53,47"
  white: "#ffffff"

color_schemes:
  notion-light:
    label: "极简白"
    primary: "#312d27"
    secondary: "#6a6965"
    accent: "#00347a"
    background: "#fffffd"
    text: "#3a3832"
    card_bg: "#f4f3f2"
    chart_colors:
      - "#00347a"
      - "#67552f"
      - "#133716"
      - "#620001"
      - "#003d00"
    semantic:
      positive: "#003d00"
      negative: "#620001"
    persona_hint: "Structured, clear, systematic. Notion-like clarity with clean hierarchy. Minimal decoration, typography-driven layout, systematic grid alignment. Clean white backgrounds, subtle light-gray cards (#f7f6f3), blue accents (#2383e2) for interactive emphasis only. Cards use 1px solid chart_color colored borders — the border itself is the only decoration. No gradients, no heavy shadows — hierarchy is created through spacing, weight, and alignment."
  notion-dark:
    label: "暗夜黑"
    primary: "#e0ded9"
    secondary: "#999896"
    accent: "#7cc0ef"
    background: "#030303"
    text: "#d3d1cc"
    card_bg: "#090909"
    chart_colors:
      - "#7cc0ef"
      - "#b5aa91"
      - "#cee6cd"
      - "#c7847e"
      - "#77a678"
    semantic:
      positive: "#77a678"
      negative: "#c7847e"
    persona_hint: "Dark mode structured clarity. Deep charcoal backgrounds (#191919), lighter dark-gray cards (#252525), soft blue accents (#529cca). Cards use 1px solid chart_color colored borders. Same systematic typography as Light mode — hierarchy through weight and spacing, not color. No gradients, no shadows. Clean, focused, minimal strain."
  notion-warm:
    label: "暖纸色"
    primary: "#2e2723"
    secondary: "#666260"
    accent: "#003c59"
    background: "#fcf7f5"
    text: "#37322e"
    card_bg: "#f0ece9"
    chart_colors:
      - "#003c59"
      - "#6c4931"
      - "#282c00"
      - "#5c0000"
      - "#003800"
    semantic:
      positive: "#003800"
      negative: "#5c0000"
    persona_hint: "Warm, paper-like structured clarity. Cream backgrounds (#fefaf6), warm beige cards (#f7f0e8), amber-wood accents (#b85c2e). Cards use 1px solid chart_color colored borders. Feels like high-quality paper stationery — systematic and clean but with organic warmth. No gradients, no shadows. Typography-driven hierarchy."
  notion-cool:
    label: "冷静蓝"
    primary: "#232a2d"
    secondary: "#606466"
    accent: "#650013"
    background: "#fafcfe"
    text: "#2e3436"
    card_bg: "#eff0f2"
    chart_colors:
      - "#650013"
      - "#2c596a"
      - "#262348"
      - "#5a0000"
      - "#003700"
    semantic:
      positive: "#003700"
      negative: "#5a0000"
    persona_hint: "Cool, serene structured clarity. Blue-white backgrounds (#f8fafc), cool gray-blue cards (#eef2f6), teal-blue accents (#3b8b9e). Cards use 1px solid chart_color colored borders. Calm, focused, analytical — like a well-organized research notebook. No gradients, no shadows. Purely typographic hierarchy."
  notion-mono:
    label: "纯粹灰"
    primary: "#181516"
    secondary: "#4e4c4d"
    accent: "#002c45"
    background: "#ffffff"
    text: "#211e1f"
    card_bg: "#f3f3f3"
    chart_colors:
      - "#002c45"
      - "#48383c"
      - "#1f1309"
      - "#2b0908"
      - "#0e2810"
    semantic:
      positive: "#0e2810"
      negative: "#2b0908"
    persona_hint: "Pure monochrome structured clarity. Black text (#1a1a1a) on white backgrounds, light gray cards (#f5f5f5). Cards use 1px solid chart_color colored borders. Zero color — all hierarchy is created through typographic weight, size, and spacing alone. The most extreme expression of Notion minimalism. No accents, no gradients, no shadows — just text, space, and structure."
typography:
  heading_font: "Inter, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif"
  body_font: "Inter, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif"
  cover_title:
    size: "48-56px"
    weight: 700
  page_title:
    size: "32-40px"
    weight: 600
  card_title:
    size: "18-22px"
    weight: 600
  body:
    size: "15-17px"
    weight: 400
  caption:
    size: "12-13px"
    weight: 400
  line_height:
    heading: 1.2-1.3
    body: 1.65-1.8
  letter_spacing:
    heading: "-0.3~-0.5px"

card_style:
  border_radius: 6
  shadow: "none"
  border: "1px solid chart_color（彩色描边，边框即装饰），hero/step_N 使用默认 1px solid rgba(55,53,47, 0.09)"
  gap: 28
  left_stripe_width: 3

gradients:
  hero_bg: "none"
  card_highlight: "none"

elevation:
  shadow_sm: "none"
  shadow_md: "none"
  shadow_lg: "none"

slide_type_overrides:
  cover:
    card_bg: "{{background}}"
    text: "{{primary}}"
    heading_scale: 1.2
    layout: full_bleed
    no_card_container: true
  quote:
    card_bg: "{{card_bg}}"
    text: "{{primary}}"
    body_font_style: "normal"
    layout: single_focus
  data:
    heading_scale: 0.9
    layout: dashboard
  section:
    background: "{{card_bg}}"
    text: "{{primary}}"
    layout: full_bleed
  summary:
    background: "{{card_bg}}"
    text: "{{primary}}"
    heading_scale: 1.1
    layout: full_bleed
    copyright: "YYYY Company Name. All rights reserved."
    copyright_size: "11-12px"
    copyright_opacity: 0.4-0.5
  content:
    background: "{{background}}"
    layout: mixed_grid
  document:
    page_width: 794
    page_height: 1123
    page_unit: "px"
    print_width: 210
    print_height: 297
    print_unit: "mm"
    background: "{{background}}"
    layout: single_focus
    no_card_container: true
    table_border: "1px solid rgba(55,53,47, 0.15)"
    cell_border: "1px solid rgba(55,53,47, 0.08)"
    header_font_size: "12-13px"
    data_font_size: "12px"
    label_font_size: "13px"
    footer_font_size: "11-12px"
    min_row_height: 26
    print_margin: "12mm 14mm"
    decoration_circle_opacity: "0.02-0.04"
    accent_stripe_height: 4

layout_types:
  - id: full_bleed
    cards: "1-3"
    description: "垂直居中，全屏"
    use: "封面、章节分隔、总结"
  - id: three_column
    cards: 3
    description: "水平等分，每栏 ~373px"
    use: "并列要点、三大优势"
  - id: two_column
    cards: 2
    description: "水平等分，每栏 ~550px"
    use: "对比分析、优劣对比"
  - id: two_column_asymmetric
    cards: 2
    description: "左宽 62% + 右窄 38%"
    use: "主次内容、问题+方案"
  - id: dashboard
    cards: "3-5"
    description: "顶行 metric 卡 + 底行 summary"
    use: "数据总览、KPI 展示"
  - id: mixed_grid
    cards: "3-4"
    description: "顶行 hero(全宽) + 底行 2-3 小卡"
    use: "核心观点+支撑论据"
  - id: hero_grid
    cards: "2-4"
    description: "左 hero 大卡 + 右 1-2 小卡堆叠"
    use: "论点+数据佐证"
  - id: single_focus
    cards: 1
    description: "居中大卡 ~900px"
    use: "核心结论、金句"
  - id: timeline
    cards: "2-5"
    description: "水平排列，步骤节点+连接线"
    use: "流程步骤、时间线"
  - id: horizontal_split
    cards: "3-4"
    description: "顶全宽 hero + 底行 2-3 小卡"
    use: "标题+支撑指标"

card_roles:
  - role: hero
    visual: "大卡，大面积，核心信息，无彩色描边（默认灰色边框）"
    required: [title, body]
    optional: [chart]
  - role: metric
    visual: "居中大数字/进度条，彩色描边（1px solid chart_color）"
    required: [chart]
    optional: []
  - role: card_0
    visual: "标准卡，彩色描边(chart_colors[0], 1px solid)"
    required: [title or body]
    optional: [chart]
  - role: card_1
    visual: "标准卡，彩色描边(chart_colors[1], 1px solid)"
    required: [title or body]
    optional: [chart]
  - role: card_2
    visual: "标准卡，彩色描边(chart_colors[2], 1px solid)"
    required: [title or body]
    optional: [chart]
  - role: card_3
    visual: "标准卡，彩色描边(chart_colors[3], 1px solid)"
    required: [title or body]
    optional: [chart]
  - role: card_4
    visual: "标准卡，彩色描边(chart_colors[4], 1px solid)"
    required: [title or body]
    optional: [chart]
  - role: left
    visual: "彩色描边(chart_0, 1px solid) + ▲ 前缀"
    required: [title, body]
    optional: [chart]
    use: "双栏对比左/正面/优势"
  - role: right
    visual: "彩色描边(chart_3, 1px solid) + ▼ 前缀"
    required: [title, body]
    optional: [chart]
    use: "双栏对比右/反面/劣势"
  - role: summary
    visual: "全宽浅色卡，彩色描边（1px solid accent）"
    required: [title or body]
    optional: [chart]
    use: "数据总结、页面收尾"
  - role: step_N
    visual: "圆形编号 + 标题 + 描述，无彩色描边（默认灰色边框）"
    required: [title, body]
    optional: []
    use: "时间线步骤 1~5"

decoration:
  accent_stripe: "3px solid {{accent}}"
  title_underline: "32×2px {{accent}}"
  page_dot: "4px {{primary}}"
  layers: ["背景层", "结构层", "内容层"]
  types:
    - id: type_a
      name: "纯排版"
      description: "无几何装饰，仅标题短线+页码，纯靠字重和间距建立层次"
    - id: type_b
      name: "彩色描边"
      description: "卡片 1px solid chart_color 彩色边框，边框即装饰"
    - id: type_c
      name: "极简"
      description: "连标题短线都省略，仅页码，完全依靠 typography 建立层次"

icons:
  style: "outline"
  stroke_width: "1.5px"
  card_size: 18
  hero_size: 32
  metric_size: 14
  color_rule: "跟随所在卡片的 chart_color, opacity: 0.6"

illustrations:
  label_align: "text-anchor=middle, label_x=graphic_cx"
  label_spacing: ">=22px from graphic bottom to label baseline"
  guide_spacing: ">=20px"
  min_stroke: "1px"
  min_font: "13px"

quality_checklist:
  - "3 层结构完整（背景->结构->内容）"
  - ">=2 个 SVG 元素"
  - ">=3 种不同 chart_color"
  - "每卡: 标题 + 正文（图标可选）"
  - "数字->图表形态"
  - "标题短线(32x2px)（Type C 极简可省略）"
  - "标题 primary 色"
  - "正文 text 色"
  - "卡片 card_bg 色"
  - "背景 background 色"
  - "字体 typography token"
  - "圆角 6px"
  - "无阴影"
  - "插图标签居中"
  - "插图间距 >=22px"
  - "插图字号 >=13px"
  - "SVG描边 >=1px"
  - "封面/总结无卡片容器且无顶部色条"
  - "卡片彩色描边轮换（每卡不同 chart_color，边框即装饰）"
  - "禁止任何渐变"
  - "禁止全宽顶部 accent 色条"
  - "禁止叠加色条（边框即装饰）"
  - "禁止半透明几何装饰图形"
  - "纯文字编号（无彩色圆圈）"

font_thresholds:
  slide_title: { min: 28, max: 40 }
  card_title: { min: 18, max: 28 }
  body: { min: 14, max: 18 }
  label: { min: 13, max: 13 }
  absolute_min: 13

safe_area:
  x_min: 48
  y_min: 32
  y_max: 706

visual_richness:
  min_svg_elements: 2
  min_colors: 3
  min_cards: 3
  min_decorations: 1
  min_layers: 4

block_types:
  header:
    description: "文档头部（LOGO/编号/日期），全宽合并，可选段落"
    colspan: full
    font_size: "12-14px"
    color: "rgba(55,53,47, 0.5)"
    border_bottom: "1px solid rgba(55,53,47, 0.1)"
    columns: "2-4"
  title:
    description: "文档主标题，card_bg 背景 + accent 下划线，必有段落"
    colspan: full
    background: "{{card_bg}}"
    color: "{{primary}}"
    font_size: "20-24px"
    font_weight: 700
    letter_spacing: "1-2px"
    border_bottom: "2px solid {{accent}}"
  info_block:
    description: "键值对信息表，标签列 + 值列，可选图片占位区"
    colspan: auto
    label_bg: "rgba(55,53,47, 0.04)"
    label_color: "{{primary}}"
    label_weight: 600
    value_bg: "{{background}}"
    value_color: "{{text}}"
    font_size: "13-14px"
    image_placeholder_bg: "{{card_bg}}"
    image_placeholder_border: "1.5px dashed rgba(35,131,226, 0.3)"
    image_placeholder_radius: 4
  table_block:
    description: "多列数据网格，含表头和交替行数据"
    colspan: auto
    header_bg_default: "{{primary}}"
    header_bg_alt_0: "{{chart_0}}"
    header_bg_alt_2: "{{chart_2}}"
    header_color: "#ffffff"
    header_weight: 600
    header_font_size: "12-13px"
    data_bg: "{{background}}"
    data_bg_alt: "rgba(55,53,47, 0.02)"
    data_font_size: "12px"
    row_height: 26
    border: "1px solid rgba(55,53,47, 0.1)"
    header_border_top: "2px solid rgba(55,53,47, 0.12)"
    header_rotation: "primary -> chart_0 -> chart_2"
  text_block:
    description: "自由段落文字，全宽合并"
    colspan: full
    background: "{{background}}"
    color: "{{text}}"
    font_size: "14-16px"
    line_height: 1.8
    border_top: "1px solid rgba(55,53,47, 0.08)"
  list_block:
    description: "编号或项目符号列表"
    colspan: full
    number_color: "{{primary}}"
    number_weight: 600
    number_size: "14px"
    item_color: "{{text}}"
    item_size: "14px"
    styles: ["ordered", "bullet", "checkbox"]
    border_top: "1px solid rgba(55,53,47, 0.08)"
  closing:
    description: "文档收束区域（结论/签名/落款），可选段落"
    colspan: full
    background: "{{card_bg}}"
    color: "{{text}}"
    font_size: "13-14px"
    border_top: "2px solid rgba(35,131,226, 0.15)"
    layouts: ["center", "split"]
  footer:
    description: "文档底部声明区（版权/备注）"
    colspan: full
    background: "{{card_bg}}"
    color: "rgba(55,53,47, 0.5)"
    font_size: "11-12px"
    line_height: 1.7
    border_top: "2px solid rgba(35,131,226, 0.12)"
    align: center
