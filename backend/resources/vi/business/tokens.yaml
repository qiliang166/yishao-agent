# Business Professional — 结构化设计 Token
# 程序解析用，所有色值/字号/间距的精确数值
# 颜色变量: {{primary}}, {{primary_rgb}}, {{accent}}, {{chart_0}}, 等

# 当前激活的色系（兼容字段）
color_scheme: deep-blue

color_schemes:
  deep-blue:
    label: "深海蓝"
    primary: "#1a365d"
    secondary: "#2d5f8a"
    accent: "#e67e22"
    background: "#ffffff"
    text: "#1a202c"
    card_bg: "#f0f4f8"
    chart_colors:
      - "#c8752e"
      - "#2d5f8a"
      - "#3b6b9e"
      - "#d4956a"
      - "#2980b9"
    semantic:
      positive: "#27ae60"
      negative: "#c0392b"
    persona_hint: "深海蓝主色（#1a365d）奠定权威基调，暖橙（#e67e22）仅用于关键强调，占比不超过 8%。大面积白色背景与浅灰蓝卡片形成清晰的色彩层级。"
  chinese-red:
    label: "中国红"
    primary: "#c41e3a"
    secondary: "#8b1a2b"
    accent: "#d4a017"
    background: "#fff8f0"
    text: "#2c1810"
    card_bg: "#fef5e6"
    chart_colors:
      - "#c41e3a"
      - "#8b1a2b"
      - "#d4a017"
      - "#b33a2e"
      - "#e8c547"
    semantic:
      positive: "#27ae60"
      negative: "#c0392b"
    persona_hint: "中国红主色（#c41e3a）传达热烈与传统，金色（#d4a017）点缀强调。米白底色与浅米卡片营造温暖、庄重的东方美学。"
  jade-green:
    label: "翡翠绿"
    primary: "#0d6b42"
    secondary: "#1a7a54"
    accent: "#27ae60"
    background: "#fafdfb"
    text: "#1a2c1e"
    card_bg: "#f0f9f4"
    chart_colors:
      - "#0d6b42"
      - "#1a7a54"
      - "#27ae60"
      - "#2ecc71"
      - "#52c77e"
    semantic:
      positive: "#27ae60"
      negative: "#c0392b"
    persona_hint: "翡翠绿主色（#0d6b42）传达自然与健康，翠绿（#27ae60）点缀生机。清新白底与浅绿卡片营造干净、可信赖的观感。"
  tech-purple:
    label: "科技紫"
    primary: "#4f46e5"
    secondary: "#6366f1"
    accent: "#818cf8"
    background: "#ffffff"
    text: "#1a1a2e"
    card_bg: "#f5f3ff"
    chart_colors:
      - "#4f46e5"
      - "#6366f1"
      - "#818cf8"
      - "#a78bfa"
      - "#c4b5fd"
    semantic:
      positive: "#27ae60"
      negative: "#c0392b"
    persona_hint: "紫色主色（#4f46e5）传达创新与智慧，浅紫（#818cf8）点缀科技感。白色底与紫色调卡片营造前瞻、智能的视觉风格。"
  dark-gold:
    label: "暗夜金"
    primary: "#1a1a2e"
    secondary: "#2d2d44"
    accent: "#c9a84c"
    background: "#fafafa"
    text: "#1a1a2e"
    card_bg: "#f5f5f0"
    chart_colors:
      - "#c9a84c"
      - "#1a1a2e"
      - "#2d2d44"
      - "#b8963e"
      - "#d4b96a"
    semantic:
      positive: "#27ae60"
      negative: "#c0392b"
    persona_hint: "暗夜底色（#1a1a2e）与金色（#c9a84c）传达奢华与克制，极简黑白金配色营造高端品牌质感。"
typography:
  heading_font: "DM Sans, Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif"
  body_font: "Inter, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
  cover_title:
    size: "58-65px"
    weight: 700
  page_title:
    size: "36-44px"
    weight: 700
  card_title:
    size: "22-24px"
    weight: 600
  body:
    size: "16-18px"
    weight: 400
  caption:
    size: "12-14px"
    weight: 400
  line_height:
    heading: 1.15-1.25
    body: 1.6-1.8
  letter_spacing:
    heading: "-0.3~-0.5px"

card_style:
  border_radius: 12
  shadow: "0 2px 8px rgba(0,0,0,0.08)"
  border: "1px solid rgba({{text_rgb}}, 0.12)"
  gap: 24
  left_stripe_width: 4

gradients:
  hero_bg: "linear-gradient(135deg, {{primary}} 0%, {{secondary}} 100%)"
  card_highlight: "linear-gradient(180deg, {{card_bg}} 0%, {{background}} 100%)"

elevation:
  shadow_sm: "0 1px 2px rgba(0,0,0,0.05)"
  shadow_md: "0 4px 12px rgba(0,0,0,0.08)"
  shadow_lg: "0 12px 40px rgba(0,0,0,0.15)"

slide_type_overrides:
  cover:
    card_bg: "{{primary}}"
    text: "#ffffff"
    heading_scale: 1.3
    layout: full_bleed
    no_card_container: true
  quote:
    card_bg: "{{primary}}"
    text: "#ffffff"
    body_font_style: "italic"
    layout: single_focus
  data:
    heading_scale: 0.9
    layout: dashboard
  section:
    background: "{{primary}}"
    text: "#ffffff"
    layout: full_bleed
  summary:
    background: "{{primary}}"
    text: "#ffffff"
    heading_scale: 1.1
    layout: full_bleed
    copyright: "© YYYY Company Name. All rights reserved."
    copyright_size: "11-12px"
    copyright_opacity: 0.4-0.5
  content:
    background: "{{background}}"
    layout: mixed_grid
  document:
    page_width: 794
    page_height: 1123
    page_unit: "px"
    print_width: 210
    print_height: 297
    print_unit: "mm"
    background: "{{background}}"
    layout: single_focus
    no_card_container: true
    table_border: "1px solid rgba({{text_rgb}}, 0.2)"
    cell_border: "1px solid rgba({{text_rgb}}, 0.1)"
    header_font_size: "12-13px"
    data_font_size: "12px"
    label_font_size: "13px"
    footer_font_size: "11-12px"
    min_row_height: 26
    print_margin: "12mm 14mm"
    decoration_circle_opacity: "0.03-0.05"
    accent_stripe_height: 5

layout_types:
  - id: full_bleed
    cards: "1-3"
    description: "垂直居中，全屏"
    use: "封面、章节分隔、总结"
  - id: three_column
    cards: 3
    description: "水平等分，每栏 ~373px"
    use: "并列要点、三大优势"
  - id: two_column
    cards: 2
    description: "水平等分，每栏 ~550px"
    use: "对比分析、优劣对比"
  - id: two_column_asymmetric
    cards: 2
    description: "左宽 62% + 右窄 38%"
    use: "主次内容、问题+方案"
  - id: dashboard
    cards: "3-5"
    description: "顶行 metric 卡 + 底行 summary"
    use: "数据总览、KPI 展示"
  - id: mixed_grid
    cards: "3-4"
    description: "顶行 hero(全宽) + 底行 2-3 小卡"
    use: "核心观点+支撑论据"
  - id: hero_grid
    cards: "2-4"
    description: "左 hero 大卡 + 右 1-2 小卡堆叠"
    use: "论点+数据佐证"
  - id: single_focus
    cards: 1
    description: "居中大卡 ~900px"
    use: "核心结论、金句"
  - id: timeline
    cards: "2-5"
    description: "水平排列，步骤节点+连接线"
    use: "流程步骤、时间线"
  - id: horizontal_split
    cards: "3-4"
    description: "顶全宽 hero + 底行 2-3 小卡"
    use: "标题+支撑指标"

card_roles:
  - role: hero
    visual: "大卡，大面积，核心信息"
    required: [title, body]
    optional: [chart]
  - role: metric
    visual: "居中大数字/进度条，顶部短色条"
    required: [chart]
    optional: []
  - role: card_0
    visual: "标准卡，色条(chart_colors[0])"
    required: [title or body]
    optional: [chart]
  - role: card_1
    visual: "标准卡，色条(chart_colors[1])"
    required: [title or body]
    optional: [chart]
  - role: card_2
    visual: "标准卡，色条(chart_colors[2])"
    required: [title or body]
    optional: [chart]
  - role: card_3
    visual: "标准卡，色条(chart_colors[3])"
    required: [title or body]
    optional: [chart]
  - role: card_4
    visual: "标准卡，色条(chart_colors[4])"
    required: [title or body]
    optional: [chart]
  - role: left
    visual: "钢蓝顶条 + ▲ 前缀"
    required: [title, body]
    optional: [chart]
    use: "双栏对比左/正面/优势"
  - role: right
    visual: "铜陶顶条 + ▼ 前缀"
    required: [title, body]
    optional: [chart]
    use: "双栏对比右/反面/劣势"
  - role: summary
    visual: "全宽浅色/半透明卡"
    required: [title or body]
    optional: [chart]
    use: "数据总结、页面收尾"
  - role: step_N
    visual: "圆形编号 + 标题 + 描述"
    required: [title, body]
    optional: []
    use: "时间线步骤 1~5"

decoration:
  accent_stripe: "4px solid {{accent}}"
  title_underline: "40×3px {{accent}}"
  page_dot: "6px {{accent}}"
  layers: ["背景层", "装饰层", "结构层", "内容层", "标识层"]
  types:
    - id: type_a
      name: "圆形点缀"
      description: "右上角半透明圆 + 顶部色条 + 标题短线 + 页码"
    - id: type_b
      name: "双几何"
      description: "左上圆 + 右下旋转方形，对角线平衡"
    - id: type_c
      name: "条纹肌理"
      description: "细网格纹理 + 右下角半透明大圆"

icons:
  style: "outline"
  stroke_width: "1.5px"
  card_size: 20
  hero_size: 36
  metric_size: 16
  color_rule: "跟随所在卡片的 chart_color, opacity: 0.7"

illustrations:
  label_align: "text-anchor=middle, label_x=graphic_cx"
  label_spacing: "≥22px from graphic bottom to label baseline"
  guide_spacing: "≥20px"
  min_stroke: "1px"
  min_font: "14px"

quality_checklist:
  - "5 层结构完整"
  - "≥3 个 SVG 元素"
  - "≥4 种不同 chart_color"
  - "≥1 个半透明几何装饰"
  - "每卡: SVG图标 + 标题 + 正文"
  - "数字→图表形态"
  - "顶部 accent 色条(4px)"
  - "标题短线(40×3px)"
  - "页码(dot + 页号)"
  - "标题 primary 色"
  - "正文 text 色"
  - "卡片 card_bg 色"
  - "背景 background 色"
  - "字体 typography token"
  - "圆角 12px"
  - "阴影 elevation token"
  - "插图标签居中"
  - "插图间距 ≥22px"
  - "插图字号 ≥14px"
  - "SVG描边 ≥1px"
  - "封面/总结无卡片容器"
  - "色条轮换"

font_thresholds:
  slide_title: { min: 28, max: 44 }
  card_title: { min: 18, max: 32 }
  body: { min: 14, max: 20 }
  label: { min: 14, max: 14 }
  absolute_min: 14

safe_area:
  x_min: 40
  y_min: 28
  y_max: 710

visual_richness:
  min_svg_elements: 3
  min_colors: 4
  min_cards: 3
  min_decorations: 2
  min_layers: 5

block_types:
  header:
    description: "文档头部（LOGO/编号/日期），全宽合并，可选段落"
    colspan: full
    font_size: "12-14px"
    color: "rgba({{text_rgb}}, 0.6)"
    border_bottom: "1px solid rgba({{text_rgb}}, 0.1)"
    columns: "2-4"
  title:
    description: "文档主标题，hero 渐变背景 + accent 下划线，必有段落"
    colspan: full
    background: "linear-gradient(135deg, {{primary}} 0%, {{secondary}} 100%)"
    color: "#ffffff"
    font_size: "20-24px"
    font_weight: 700
    letter_spacing: "2-3px"
    border_bottom: "3px solid {{accent}}"
  info_block:
    description: "键值对信息表，标签列 + 值列，可选图片占位区"
    colspan: auto
    label_bg: "{{card_bg}}"
    label_color: "{{primary}}"
    label_weight: 600
    value_bg: "{{background}}"
    value_color: "{{text}}"
    font_size: "13-14px"
    image_placeholder_bg: "{{card_bg}}"
    image_placeholder_border: "1.5px dashed rgba({{accent_rgb}}, 0.35)"
    image_placeholder_radius: 8
  table_block:
    description: "多列数据网格，含表头和交替行数据"
    colspan: auto
    header_bg_default: "{{chart_1}}"
    header_bg_alt_0: "{{chart_0}}"
    header_bg_alt_2: "{{chart_2}}"
    header_color: "#ffffff"
    header_weight: 600
    header_font_size: "12-13px"
    data_bg: "{{background}}"
    data_bg_alt: "rgba({{text_rgb}}, 0.02)"
    data_font_size: "12px"
    row_height: 26
    border: "1px solid rgba({{text_rgb}}, 0.1)"
    header_border_top: "2px solid rgba({{text_rgb}}, 0.15)"
    header_rotation: "chart_1 → chart_0 → chart_2"
  text_block:
    description: "自由段落文字，全宽合并"
    colspan: full
    background: "{{background}}"
    color: "{{text}}"
    font_size: "14-16px"
    line_height: 1.8
    border_top: "1px solid rgba({{text_rgb}}, 0.1)"
  list_block:
    description: "编号或项目符号列表"
    colspan: full
    number_color: "{{primary}}"
    number_weight: 600
    number_size: "14px"
    item_color: "{{text}}"
    item_size: "14px"
    styles: ["ordered", "bullet", "checkbox"]
    border_top: "1px solid rgba({{text_rgb}}, 0.1)"
  closing:
    description: "文档收束区域（结论/签名/落款），可选段落"
    colspan: full
    background: "{{card_bg}}"
    color: "{{text}}"
    font_size: "13-14px"
    border_top: "2px solid rgba({{accent_rgb}}, 0.15)"
    layouts: ["center", "split"]
  footer:
    description: "文档底部声明区（版权/备注）"
    colspan: full
    background: "{{card_bg}}"
    color: "rgba({{text_rgb}}, 0.5)"
    font_size: "11-12px"
    line_height: 1.7
    border_top: "2px solid rgba({{accent_rgb}}, 0.2)"
    align: center
