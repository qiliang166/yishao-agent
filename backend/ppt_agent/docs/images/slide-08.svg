<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="highlight-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e65c00;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更智能：HAD辅助驾驶
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Hardware specs -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="560" height="320" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">硬件配置（全系标配）</text>
    <text x="40" y="90" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="white">• 128线超广角激光雷达</text>
    <text x="40" y="130" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="white">• 4D毫米波雷达</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="white">• 11颗高清摄像头</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="white">• 12颗超声波雷达</text>
    <rect x="40" y="250" width="480" height="40" rx="8" fill="rgba(34,211,238,0.1)"/>
    <text x="280" y="278" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366">探测距离: 200m | 360°覆盖</text>
  </g>
  
  <g transform="translate(648, 140)">
    <rect x="0" y="0" width="568" height="180" rx="20" fill="url(#highlight-bg)" stroke="#FF6900" stroke-width="2"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" font-weight="600">算力芯片</text>
    <text x="40" y="110" font-family="sans-serif" font-size="72" font-weight="700" fill="white">700</text>
    <text x="40" y="150" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">TOPS</text>
    <text x="40" y="175" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">NVIDIA Thor-U (老款508 TOPS)</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(648, 340)">
    <rect x="0" y="0" width="568" height="120" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">功能特点</text>
    <text x="40" y="75" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">车位到车位领航 | ETC/闸机通行</text>
    <text x="40" y="100" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">窄路环岛通行 | 停车场寻位泊车</text>
  </g>
  
  <!-- R&D -->
  <g transform="translate(64, 500)">
    <rect x="0" y="0" width="1152" height="100" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="35" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">研发投入</text>
    <text x="40" y="70" font-family="sans-serif" font-size="24" font-weight="700" fill="white">首期投资57.9亿元 | 团队1800+人 | 测试车400+台</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">08</text>
</svg>