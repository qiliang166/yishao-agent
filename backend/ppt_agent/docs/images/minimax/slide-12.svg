<text x="40" y="58" font-family="system-ui" font-size="32" font-weight="700" fill="#ffffff">三电升级：效率与性能</text>
<rect x="50" y="130" width="280" height="260" rx="12" fill="#f0f4f8"/><rect x="50" y="130" width="280" height="50" fill="#1a365d"/><text x="80" y="165" font-family="system-ui" font-size="16" font-weight="700" fill="#ffffff">V6s Plus电机</text><text x="80" y="230" font-family="system-ui" font-size="14" fill="#666">最高转速22000rpm</text><text x="80" y="260" font-family="system-ui" font-size="14" fill="#666">标准版235kW</text><text x="80" y="290" font-family="system-ui" font-size="14" fill="#666">Max版508kW</text><text x="80" y="320" font-family="system-ui" font-size="14" fill="#e67e22">690马力</text>
