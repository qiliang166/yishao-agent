<rect x="50" y="130" width="560" height="200" rx="16" fill="#f0f4f8"/><rect x="50" y="130" width="560" height="60" fill="#1a365d"/><text x="100" y="172" font-family="system-ui" font-size="22" font-weight="700" fill="#ffffff">三层环绕氛围灯</text><text x="100" y="240" font-family="system-ui" font-size="16" fill="#666">联动音乐节奏、驾驶模式变化</text><text x="100" y="280" font-family="system-ui" font-size="16" fill="#666">256色氛围灯，支持音乐律动</text>
