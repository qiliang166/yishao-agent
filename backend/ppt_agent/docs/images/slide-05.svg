<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900"/>
      <stop offset="100%" style="stop-color:#e65c00"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更好开：性能表现
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Main stats cards -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="370" height="240" rx="20" fill="url(#accent-bg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="40" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" font-weight="600">0-100km/h</text>
    <text x="40" y="130" font-family="sans-serif" font-size="80" font-weight="700" fill="white">3.08</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">秒</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">Max版</text>
  </g>
  
  <g transform="translate(454, 140)">
    <rect x="0" y="0" width="370" height="240" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">最高时速</text>
    <text x="40" y="130" font-family="sans-serif" font-size="80" font-weight="700" fill="white">265</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">km/h</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">极速表现</text>
  </g>
  
  <g transform="translate(844, 140)">
    <rect x="0" y="0" width="370" height="240" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">Max综合功率</text>
    <text x="40" y="130" font-family="sans-serif" font-size="80" font-weight="700" fill="white">690</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">马力</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">前后双电机四驱</text>
  </g>
  
  <!-- Bottom specs -->
  <g transform="translate(64, 420)">
    <rect x="0" y="0" width="560" height="140" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">电机类型</text>
    <text x="40" y="80" font-family="sans-serif" font-size="28" font-weight="700" fill="white">全系标配 V6s Plus</text>
    <text x="40" y="115" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">最高转速 22,000 rpm</text>
  </g>
  
  <g transform="translate(648, 420)">
    <rect x="0" y="0" width="568" height="140" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">动力对比</text>
    <text x="40" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Standard/Pro: 320马力 (235kW)</text>
    <text x="40" y="110" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">Max: 690马力 (508kW) 四驱</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">05</text>
</svg>