<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更好看：设计焕新
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Car showcase area -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="560" height="320" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="280" y="150" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">
      [ 车型展示区 ]
    </text>
    <text x="280" y="180" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.3)">
      溜背轿跑造型 | 风阻0.195Cd
    </text>
  </g>
  
  <!-- Specs cards -->
  <g transform="translate(648, 140)">
    <rect x="0" y="0" width="568" height="150" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">车身尺寸</text>
    <text x="40" y="80" font-family="sans-serif" font-size="36" font-weight="700" fill="white">4997 × 1963 × 1440mm</text>
    <text x="40" y="115" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">轴距 3000mm | C级豪华轿车</text>
  </g>
  
  <g transform="translate(648, 310)">
    <rect x="0" y="0" width="274" height="150" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">车身颜色</text>
    <text x="40" y="90" font-family="sans-serif" font-size="48" font-weight="700" fill="white">9款</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">3款新色首发</text>
  </g>
  
  <g transform="translate(942, 310)">
    <rect x="0" y="0" width="274" height="150" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">轮毂选择</text>
    <text x="40" y="90" font-family="sans-serif" font-size="48" font-weight="700" fill="white">6款</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">19-21寸可选</text>
  </g>
  
  <!-- Color palette -->
  <g transform="translate(64, 500)">
    <rect x="0" y="0" width="1152" height="140" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">新色首发</text>
    
    <!-- Color swatches -->
    <circle cx="80" cy="90" r="25" fill="#4ECDC4"/>
    <circle cx="160" cy="90" r="25" fill="#FF6B6B"/>
    <circle cx="240" cy="90" r="25" fill="#45B7D1"/>
    
    <text x="290" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="white">卡普里蓝 | 赤霞红 | 翠绿</text>
    <text x="290" y="110" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">另有：雅灰、珍珠白、璀璨洋红、霞光紫、曜石黑、流金粉</text>
  </g>
  
  <!-- Page number -->
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">03</text>
</svg>