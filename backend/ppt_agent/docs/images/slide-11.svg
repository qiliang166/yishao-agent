<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="highlight-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e65c00;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更安全：全方位防护
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Passive safety -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="560" height="280" rx="20" fill="url(#highlight-bg)" stroke="#FF6900" stroke-width="2"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" font-weight="600">被动安全</text>
    <text x="40" y="100" font-family="sans-serif" font-size="80" font-weight="700" fill="white">9</text>
    <text x="40" y="140" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">个安全气囊（全系标配）</text>
    <text x="40" y="190" font-family="sans-serif" font-size="28" font-weight="700" fill="white">2200MPa 小米超强钢</text>
    <text x="40" y="230" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">内嵌式防滚架: A柱→C柱</text>
    <text x="40" y="260" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">高强度钢+铝合金占比90.3%</text>
  </g>
  
  <!-- Battery safety -->
  <g transform="translate(648, 140)">
    <rect x="0" y="0" width="568" height="280" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">电池安全</text>
    <text x="40" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="white">1500MPa 防刮底横梁</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">SU7 Ultra同款防弹涂层</text>
    <rect x="40" y="150" width="488" height="80" rx="12" fill="rgba(34,211,238,0.1)"/>
    <text x="60" y="180" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#FFB366">耐刮擦提升10倍</text>
    <text x="60" y="205" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#FFB366">耐撕裂提升10倍 | 耐穿刺提升13倍</text>
    <text x="40" y="255" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">电池包通过超1230项安全测试</text>
  </g>
  
  <!-- Safety redundancy -->
  <g transform="translate(64, 460)">
    <rect x="0" y="0" width="1152" height="120" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">安全冗余</text>
    <text x="40" y="75" font-family="sans-serif" font-size="24" font-weight="700" fill="white">三重冗余车门把手</text>
    <text x="40" y="100" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">车外机械拉手 + 门锁冗余备份电源 + 车内应急机械拉手</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">11</text>
</svg>