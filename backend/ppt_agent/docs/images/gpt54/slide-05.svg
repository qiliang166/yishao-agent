    <circle cx="648" cy="466" r="4" fill="#42E8FF"/><text x="664" y="472" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">全系静音夹层玻璃</tspan></text><circle cx="648" cy="504" r="4" fill="#42E8FF"/><text x="664" y="510" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">三层镀银前风挡</tspan></text><circle cx="648" cy="542" r="4" fill="#42E8FF"/><text x="664" y="548" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">Max 版调光天幕体验更完整</tspan></text>

