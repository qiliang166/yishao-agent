    <circle cx="648" cy="228" r="4" fill="#42E8FF"/><text x="664" y="234" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">18 向调节</tspan></text><circle cx="648" cy="266" r="4" fill="#42E8FF"/><text x="664" y="272" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">按摩 + 主动侧翼支撑</tspan></text><circle cx="648" cy="304" r="4" fill="#42E8FF"/><text x="664" y="310" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="664" dy="0">核心感受：更贴身、更稳、更不累</tspan></text>

