    <text x="72" y="100" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F3F7FB">座舱焕新：豪华感从“看上去不错”变成“坐进去就能感到值”</text>
