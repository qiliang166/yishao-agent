    <circle cx="108" cy="494" r="4" fill="#42E8FF"/><text x="124" y="500" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">对称式中控 + 金属质感实体按键，视觉秩序更强</tspan></text><circle cx="108" cy="532" r="4" fill="#42E8FF"/><text x="124" y="538" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">三层环绕氛围灯 + 高频接触区软包，豪华感更完整</tspan></text><circle cx="108" cy="570" r="4" fill="#42E8FF"/><text x="124" y="576" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">静音夹层玻璃与防晒隔热升级，日常舒适感更强</tspan></text>

