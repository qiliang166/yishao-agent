    <text x="952" y="476" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#F3F7FB"><tspan x="952" dy="0">这一代不只照顾驾驶者，</tspan><tspan x="952" dy="+32.4">也明显更照顾家人的乘坐感受。</tspan></text>
    
