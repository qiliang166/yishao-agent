    <circle cx="952" cy="228" r="4" fill="#42E8FF"/><text x="968" y="234" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="968" dy="0">副驾零重力</tspan></text><circle cx="952" cy="266" r="4" fill="#42E8FF"/><text x="968" y="272" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="968" dy="0">后排更柔软更能躺</tspan></text><circle cx="952" cy="304" r="4" fill="#42E8FF"/><text x="968" y="310" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500" fill="#F3F7FB"><tspan x="968" dy="0">从“坐得下”升级到“愿意坐”</tspan></text>

