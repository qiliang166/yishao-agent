      <text x="28" y="23" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#42E8FF">04</text>
    </g>
    
    <rect x="72" y="150" width="650" height="454" rx="30" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
    <text x="108" y="194" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#FFB15C">视觉主张</text>
    <text x="108" y="230" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#F3F7FB">保留成功比例，用细节把“成熟性能感”做出来</text>
