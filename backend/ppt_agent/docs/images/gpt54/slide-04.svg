    <text x="780" y="220" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#9FB4CF">全系共 9 种颜色，重点记住 3 个最容易形成记忆点的新表达</text>
    <circle cx="796" cy="258" r="16" fill="#5DB5FF" stroke="#E8EEF4" stroke-opacity="0.25" stroke-width="1"/>
