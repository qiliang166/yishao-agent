    <circle cx="780" cy="468" r="4" fill="#42E8FF"/><text x="796" y="474" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="796" dy="0">更有冲击力的前脸</tspan></text><circle cx="780" cy="505" r="4" fill="#42E8FF"/><text x="796" y="511" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="796" dy="0">更运动的轮毂细节</tspan></text><circle cx="780" cy="542" r="4" fill="#42E8FF"/><text x="796" y="548" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="796" dy="0">整车贵感被拉高</tspan></text>

    <rect x="992" y="410" width="216" height="194" rx="28" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
