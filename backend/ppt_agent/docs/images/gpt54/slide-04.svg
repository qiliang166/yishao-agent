    <text x="72" y="100" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F3F7FB">设计焕新：经典比例继续，细节更有性能感</text>
    <rect x="72" y="112" width="96" height="4" rx="2" fill="url(#orangeGrad)"/>
    <g transform="translate(1172,34)">
