    <circle cx="1016" cy="468" r="4" fill="#42E8FF"/><text x="1032" y="474" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="1032" dy="0">熟悉感还在</tspan></text><circle cx="1016" cy="505" r="4" fill="#42E8FF"/><text x="1032" y="511" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="1032" dy="0">更像成熟性能车</tspan></text><circle cx="1016" cy="542" r="4" fill="#42E8FF"/><text x="1032" y="548" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#F3F7FB"><tspan x="1032" dy="0">传播辨识度更高</tspan></text>
    
