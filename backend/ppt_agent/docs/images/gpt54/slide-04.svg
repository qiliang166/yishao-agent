    <text x="824" y="336" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#9FB4CF">更热烈，也更有性能张力</text>
    <circle cx="796" cy="362" r="16" fill="#406A62" stroke="#E8EEF4" stroke-opacity="0.25" stroke-width="1"/>
