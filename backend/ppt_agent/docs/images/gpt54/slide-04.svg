    <text x="824" y="284" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#9FB4CF">轻盈年轻，传播感最强</text>
    <circle cx="796" cy="310" r="16" fill="#E5413C" stroke="#E8EEF4" stroke-opacity="0.25" stroke-width="1"/>
