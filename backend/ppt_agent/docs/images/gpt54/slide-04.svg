    <g transform="translate(270,590)"><rect x="0" y="0" width="98" height="32" rx="16" fill="#112941" stroke="#315B8D" stroke-width="1"/><text x="49.0" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#F3F7FB">新进气格栅</text></g>
