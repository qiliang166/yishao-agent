<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#07111E"/>
        <stop offset="55%" stop-color="#0B182B"/>
        <stop offset="100%" stop-color="#06101B"/>
      </linearGradient>
      <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#132842" stop-opacity="0.96"/>
        <stop offset="100%" stop-color="#0D1B2F" stop-opacity="0.92"/>
      </linearGradient>
      <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6D7BFF"/>
        <stop offset="100%" stop-color="#4C5BEA"/>
      </linearGradient>
      <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#42E8FF"/>
        <stop offset="100%" stop-color="#1AB7D8"/>
      </linearGradient>
      <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF7A1A"/>
        <stop offset="100%" stop-color="#FFB15C"/>
      </linearGradient>
      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0"/>
        <stop offset="30%" stop-color="#FF7A1A" stop-opacity="0.85"/>
        <stop offset="70%" stop-color="#42E8FF" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#42E8FF" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="cyanGlow">
        <stop offset="0%" stop-color="#42E8FF" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#42E8FF" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="orangeGlow">
        <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="indigoGlow">
        <stop offset="0%" stop-color="#6D7BFF" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#6D7BFF" stop-opacity="0"/>
      </radialGradient>
      <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
        <circle cx="14" cy="16" r="1" fill="#9CB3CF"/>
        <circle cx="54" cy="46" r="1" fill="#9CB3CF"/>
        <circle cx="92" cy="18" r="1" fill="#9CB3CF"/>
        <circle cx="88" cy="92" r="1" fill="#9CB3CF"/>
        <circle cx="20" cy="78" r="1" fill="#9CB3CF"/>
      </pattern>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
      </filter>
    </defs>
    
    
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <rect width="1280" height="720" fill="url(#grain)" opacity="0.08"/>
    <g><line x1="0" y1="0" x2="0" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="128" y1="0" x2="128" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="256" y1="0" x2="256" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="384" y1="0" x2="384" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="512" y1="0" x2="512" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="768" y1="0" x2="768" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="896" y1="0" x2="896" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1024" y1="0" x2="1024" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1152" y1="0" x2="1152" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1280" y1="0" x2="1280" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="0" x2="1280" y2="0" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="128" x2="1280" y2="128" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="256" x2="1280" y2="256" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="384" x2="1280" y2="384" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="512" x2="1280" y2="512" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="640" x2="1280" y2="640" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/></g>
    <circle cx="1120" cy="140" r="260" fill="url(#cyanGlow)" opacity="0.15"/>
    <circle cx="150" cy="620" r="220" fill="url(#orangeGlow)" opacity="0.15"/>
    <circle cx="1120" cy="90" r="220" fill="url(#indigoGlow)" opacity="0.22"/>
    <path d="M-40 652 C 160 590 308 612 492 534 S 810 368 1320 176" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" opacity="0.62"/>
    <path d="M-20 630 C 190 560 352 578 522 512 S 846 342 1300 134" fill="none" stroke="#42E8FF" stroke-opacity="0.16" stroke-width="10" stroke-linecap="round"/>
    
    <text x="72" y="140" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#FFB15C">最终结论</text>
    <text x="72" y="246" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="800" fill="#F3F7FB">新一代小米 SU7</text>
    <text x="72" y="332" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="#F3F7FB">值得认真看看</text>
    <text x="72" y="392" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="500" fill="#9FB4CF">它把热度、产品力、智能和安全，做成了一台更接近主流爆款答案的纯电轿车</text>
    <g transform="translate(72,444)"><rect x="0" y="0" width="136" height="32" rx="16" fill="#12283D" stroke="#315B8D" stroke-width="1"/><text x="68.0" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#F3F7FB">21.99 万元起</text></g>
    <g transform="translate(220,444)"><rect x="0" y="0" width="148" height="32" rx="16" fill="#12283D" stroke="#315B8D" stroke-width="1"/><text x="74.0" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#42E8FF">Pro 版 902km</text></g>
    <g transform="translate(380,444)"><rect x="0" y="0" width="119" height="32" rx="16" fill="#12283D" stroke="#315B8D" stroke-width="1"/><text x="59.5" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#FFB15C">全系激光雷达</text></g>
    <g transform="translate(558,444)"><rect x="0" y="0" width="134" height="32" rx="16" fill="#12283D" stroke="#315B8D" stroke-width="1"/><text x="67.0" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#F3F7FB">门把手三重冗余</text></g>
    <rect x="720" y="108" width="488" height="464" rx="30" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
    <text x="756" y="162" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#42E8FF">看车建议</text>
    <circle cx="756" cy="206" r="4" fill="#FF7A1A"/><text x="772" y="212" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" fill="#F3F7FB"><tspan x="772" dy="0">先看 Pro 版：它最能代表这代</tspan><tspan x="772" dy="+25.6">SU7 的综合实力</tspan></text><circle cx="756" cy="278" r="4" fill="#FF7A1A"/><text x="772" y="284" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" fill="#F3F7FB"><tspan x="772" dy="0">到店重点感受：座舱静谧、座椅舒适、底盘质感和智能交互</tspan></text><circle cx="756" cy="325" r="4" fill="#FF7A1A"/><text x="772" y="331" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="500" fill="#F3F7FB"><tspan x="772" dy="0">注意权益和改配时间窗口，发布初期决策节奏会更紧</tspan></text>
    <text x="756" y="420" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#42E8FF">一句话收尾</text>
    <text x="756" y="468" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="800" fill="#F3F7FB"><tspan x="756" dy="0">当 20-30 万级纯电轿车进入价值战，</tspan><tspan x="756" dy="+35.9">新一代 SU7 正试图用“综合更强”而不是“单项更猛”赢下这一轮竞争。</tspan></text>
    <text x="1198" y="650" text-anchor="end" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#FFB15C">12 / 12</text>
    <text x="72" y="698" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6985A7">核心来源：小米发布会公开信息、IT之家、雷科技、比亚迪官网、小鹏官网；讲稿备注已同步生成</text>
    </svg>