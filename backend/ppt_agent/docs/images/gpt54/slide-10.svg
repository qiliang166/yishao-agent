    <line x1="72" y1="674" x2="1208" y2="674" stroke="#294B71" stroke-width="1" stroke-opacity="0.55"/>
    <text x="72" y="694" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6985A7">来源：小米发布会公开信息、雷科技、IT之家；门把手三重冗余与车身电池数据按公开资料整理</text>
    
