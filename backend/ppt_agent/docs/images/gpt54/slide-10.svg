    <text x="102" y="398" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="72" font-weight="800" fill="#F3F7FB">2200</text>
    <text x="290" y="398" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#42E8FF">MPa</text>
