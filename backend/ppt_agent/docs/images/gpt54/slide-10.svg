    <text x="72" y="100" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F3F7FB">安全体系：从车身、电池到门把手，把极端场景都考虑进去</text>
