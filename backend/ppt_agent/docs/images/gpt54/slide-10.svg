    <circle cx="878" cy="454" r="4" fill="#FFB15C"/><text x="894" y="460" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#F3F7FB"><tspan x="894" dy="0">车外机械拉手</tspan></text><circle cx="878" cy="495" r="4" fill="#FFB15C"/><text x="894" y="501" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#F3F7FB"><tspan x="894" dy="0">冗余备份电源</tspan></text><circle cx="878" cy="536" r="4" fill="#FFB15C"/><text x="894" y="542" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#F3F7FB"><tspan x="894" dy="0">车内应急机械拉手</tspan></text>

    <rect x="72" y="624" width="1136" height="40" rx="20" fill="#0E1D31" stroke="#315B8D" stroke-width="1" filter="url(#shadow)" />
