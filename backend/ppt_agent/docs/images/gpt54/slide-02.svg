<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#07111E"/>
        <stop offset="55%" stop-color="#0B182B"/>
        <stop offset="100%" stop-color="#06101B"/>
      </linearGradient>
      <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#132842" stop-opacity="0.96"/>
        <stop offset="100%" stop-color="#0D1B2F" stop-opacity="0.92"/>
      </linearGradient>
      <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6D7BFF"/>
        <stop offset="100%" stop-color="#4C5BEA"/>
      </linearGradient>
      <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#42E8FF"/>
        <stop offset="100%" stop-color="#1AB7D8"/>
      </linearGradient>
      <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF7A1A"/>
        <stop offset="100%" stop-color="#FFB15C"/>
      </linearGradient>
      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0"/>
        <stop offset="30%" stop-color="#FF7A1A" stop-opacity="0.85"/>
        <stop offset="70%" stop-color="#42E8FF" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#42E8FF" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="cyanGlow">
        <stop offset="0%" stop-color="#42E8FF" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#42E8FF" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="orangeGlow">
        <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="indigoGlow">
        <stop offset="0%" stop-color="#6D7BFF" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#6D7BFF" stop-opacity="0"/>
      </radialGradient>
      <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
        <circle cx="14" cy="16" r="1" fill="#9CB3CF"/>
        <circle cx="54" cy="46" r="1" fill="#9CB3CF"/>
        <circle cx="92" cy="18" r="1" fill="#9CB3CF"/>
        <circle cx="88" cy="92" r="1" fill="#9CB3CF"/>
        <circle cx="20" cy="78" r="1" fill="#9CB3CF"/>
      </pattern>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
      </filter>
    </defs>
    
    
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <rect width="1280" height="720" fill="url(#grain)" opacity="0.08"/>
    <g><line x1="0" y1="0" x2="0" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="128" y1="0" x2="128" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="256" y1="0" x2="256" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="384" y1="0" x2="384" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="512" y1="0" x2="512" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="768" y1="0" x2="768" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="896" y1="0" x2="896" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1024" y1="0" x2="1024" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1152" y1="0" x2="1152" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="1280" y1="0" x2="1280" y2="720" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="0" x2="1280" y2="0" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="128" x2="1280" y2="128" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="256" x2="1280" y2="256" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="384" x2="1280" y2="384" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="512" x2="1280" y2="512" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/><line x1="0" y1="640" x2="1280" y2="640" stroke="#8DA7C5" stroke-opacity="0.03" stroke-width="1"/></g>
    <circle cx="1120" cy="140" r="260" fill="url(#cyanGlow)" opacity="0.15"/>
    <circle cx="150" cy="620" r="220" fill="url(#orangeGlow)" opacity="0.15"/>
    
    <path d="M-40 652 C 160 590 308 612 492 534 S 810 368 1320 176" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" opacity="0.62"/>
    <path d="M-20 630 C 190 560 352 578 522 512 S 846 342 1300 134" fill="none" stroke="#42E8FF" stroke-opacity="0.16" stroke-width="10" stroke-linecap="round"/>
    
    
    <g transform="translate(72,34)"><rect x="0" y="0" width="106" height="32" rx="16" fill="#0F2136" stroke="#315B8D" stroke-width="1"/><text x="53.0" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#9FB4CF">Momentum</text></g>
    <text x="72" y="100" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F3F7FB">为什么说它是“新一代”</text>
    <rect x="72" y="112" width="96" height="4" rx="2" fill="url(#orangeGrad)"/>
    <g transform="translate(1172,34)">
      <rect x="0" y="0" width="56" height="34" rx="17" fill="#0F2136" stroke="#315B8D" stroke-width="1"/>
      <text x="28" y="23" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#42E8FF">02</text>
    </g>
     
    <rect x="72" y="146" width="420" height="478" rx="28" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
    <text x="108" y="222" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#FFB15C">核心判断</text>
    <text x="108" y="290" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="44" font-weight="800" fill="#F3F7FB"><tspan x="108" dy="0">不是改个外观</tspan><tspan x="108" dy="+51.9">而是整车级升级</tspan></text>
    <circle cx="108" cy="384" r="4" fill="#42E8FF"/><text x="124" y="390" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">底层平台、底盘、三电、智驾、安全同步抬升</tspan></text><circle cx="108" cy="428" r="4" fill="#42E8FF"/><text x="124" y="434" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">目标受众从尝鲜用户，转向更成熟的大众购车人群</tspan></text><circle cx="108" cy="472" r="4" fill="#42E8FF"/><text x="124" y="478" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#9FB4CF"><tspan x="124" dy="0">它要回答的，是“爆款之后怎样继续成为主流”</tspan></text>

    <rect x="524" y="146" width="208" height="128" rx="24" fill="url(#indigoGrad)" stroke="#6D7BFF" stroke-width="0" filter="url(#shadow)" />
    <text x="552" y="184" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#DCE4FF">累计销量</text>
    <text x="552" y="238" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="42" font-weight="800" fill="#F3F7FB">38万+</text>
    <text x="552" y="262" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#DCE4FF">第一代 SU7 不到两年</text>

    <rect x="756" y="146" width="208" height="128" rx="24" fill="url(#cyanGrad)" stroke="#42E8FF" stroke-width="0" filter="url(#shadow)" />
    <text x="784" y="184" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#073141">2025 全年销量</text>
    <text x="784" y="238" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="42" font-weight="800" fill="#062334">24.6万</text>
    <text x="784" y="262" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#08344A">20 万以上轿车冠军</text>

    <rect x="988" y="146" width="220" height="128" rx="24" fill="url(#orangeGrad)" stroke="#FF7A1A" stroke-width="0" filter="url(#shadow)" />
    <text x="1016" y="184" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#3B1700">发布后热度</text>
    <text x="1016" y="238" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="42" font-weight="800" fill="#2C0B00">1.5万</text>
    <text x="1016" y="262" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#4A1B00">约 34 分钟锁单突破</text>

    <rect x="524" y="310" width="332" height="150" rx="24" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
    <g transform="translate(552,332)"><rect x="0" y="0" width="103" height="32" rx="16" fill="#112941" stroke="#315B8D" stroke-width="1"/><text x="51.5" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#FFB15C">设计与豪华</text></g>
    <text x="552" y="390" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#F3F7FB"><tspan x="552" dy="0">经典比例保留，</tspan><tspan x="552" dy="+31.2">但整车质感明显进了一档</tspan></text>

    <rect x="876" y="310" width="332" height="150" rx="24" fill="url(#panelGrad)" stroke="#23456B" stroke-width="1" filter="url(#shadow)" />
    <g transform="translate(904,332)"><rect x="0" y="0" width="103" height="32" rx="16" fill="#112941" stroke="#315B8D" stroke-width="1"/><text x="51.5" y="21" text-anchor="middle" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#FFB15C">性能与补能</text></g>
    <text x="904" y="390" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#F3F7FB"><tspan x="904" dy="0">三电、补能、底盘一起升级，</tspan><tspan x="904" dy="+31.2">把“好开”做成体系能力</tspan></text>

    <rect x="524" y="484" width="684" height="140" rx="24" fill="#0E1D31" stroke="#315B8D" stroke-width="1" filter="url(#shadow)" />
    <text x="552" y="526" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#42E8FF">一句话看懂</text>
    <text x="552" y="574" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="800" fill="#F3F7FB"><tspan x="552" dy="0">新一代 SU7 的重点不是某个单项冠军，</tspan><tspan x="552" dy="+36.2">而是把设计、性能、智能和安全都补成了更完整的一台车。</tspan></text>
    
    <line x1="72" y1="674" x2="1208" y2="674" stroke="#294B71" stroke-width="1" stroke-opacity="0.55"/>
    <text x="72" y="694" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6985A7">来源：小米发布会公开信息、IT之家、雷科技；锁单数据以媒体公开报道为准</text>
    
    </svg>