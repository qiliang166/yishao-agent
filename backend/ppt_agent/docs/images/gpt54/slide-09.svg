    <text x="794" y="468" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#F3F7FB"><tspan x="794" dy="0">可以更接近目标店铺和电梯口，</tspan><tspan x="794" dy="+29.7">把“最后 100 米”也做细</tspan></text>

