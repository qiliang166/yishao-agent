<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900"/>
      <stop offset="100%" style="stop-color:#e65c00"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更好开：极速充电
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Voltage platform -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="560" height="180" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">高压平台</text>
    <text x="40" y="90" font-family="sans-serif" font-size="36" font-weight="700" fill="white">Standard/Pro: 752V</text>
    <text x="40" y="140" font-family="sans-serif" font-size="36" font-weight="700" fill="white">Max: 897V</text>
  </g>
  
  <g transform="translate(648, 140)">
    <rect x="0" y="0" width="568" height="180" rx="20" fill="url(#accent-bg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" font-weight="600">Max版充电倍率</text>
    <text x="40" y="120" font-family="sans-serif" font-size="80" font-weight="700" fill="white">5.2C</text>
    <text x="40" y="160" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">最高充电倍率</text>
  </g>
  
  <!-- Charging speed -->
  <g transform="translate(64, 360)">
    <rect x="0" y="0" width="370" height="200" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">10%-80%时间</text>
    <text x="40" y="110" font-family="sans-serif" font-size="64" font-weight="700" fill="white">12</text>
    <text x="40" y="150" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">分钟 (Max)</text>
    <text x="40" y="180" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">堪比加油的速度</text>
  </g>
  
  <g transform="translate(454, 360)">
    <rect x="0" y="0" width="370" height="200" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">15分钟补能</text>
    <text x="40" y="110" font-family="sans-serif" font-size="64" font-weight="700" fill="white">670</text>
    <text x="40" y="150" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km (Max)</text>
    <text x="40" y="180" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">快充31%提升</text>
  </g>
  
  <g transform="translate(844, 360)">
    <rect x="0" y="0" width="370" height="200" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">全系快充对比</text>
    <text x="40" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">Standard: +450km</text>
    <text x="40" y="120" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">Pro: +490km</text>
    <text x="40" y="155" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white" font-weight="600">Max: +670km</text>
    <text x="40" y="185" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">15分钟补能里程</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">07</text>
</svg>