<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更好开：蛟龙底盘
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Chassis hardware -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="1152" height="180" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">硬件配置</text>
    <text x="40" y="85" font-family="sans-serif" font-size="28" font-weight="700" fill="white">前双叉臂 + 后五连杆独立悬架</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Pro/Max: 闭式双腔空气弹簧 + CDC阻尼可变减振器</text>
    <text x="40" y="160" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">前四活塞固定卡钳 | 265mm后宽胎</text>
  </g>
  
  <!-- Software features -->
  <g transform="translate(64, 360)">
    <rect x="0" y="0" width="560" height="200" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">智能功能</text>
    <text x="40" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 湿滑路面AI多模态监测</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 智能底盘预瞄抬升</text>
    <text x="40" y="165" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 防滑协同控制系统</text>
  </g>
  
  <g transform="translate(648, 360)">
    <rect x="0" y="0" width="568" height="200" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">舒适体验</text>
    <text x="40" y="85" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 晕车舒缓模式</text>
    <text x="40" y="125" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 湿滑模式</text>
    <text x="40" y="165" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="white">• 悬架高度可调 (-20mm ~ +30mm)</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">10</text>
</svg>