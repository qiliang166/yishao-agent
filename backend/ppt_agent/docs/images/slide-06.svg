<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="highlight-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e65c00;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="64" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="white">
    更好开：超长续航
  </text>
  <rect x="64" y="100" width="120" height="4" rx="2" fill="#FFB366"/>
  
  <!-- Range cards -->
  <g transform="translate(64, 140)">
    <rect x="0" y="0" width="370" height="280" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">Standard</text>
    <text x="40" y="130" font-family="sans-serif" font-size="72" font-weight="700" fill="white">720</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">km</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">73kWh 磷酸铁锂</text>
    <text x="40" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">+20km vs 老款</text>
  </g>
  
  <g transform="translate(454, 140)">
    <rect x="0" y="0" width="370" height="280" rx="20" fill="url(#highlight-bg)" stroke="#FF6900" stroke-width="2"/>
    <rect x="0" y="0" width="370" height="36" rx="20" fill="#FF6900"/>
    <text x="185" y="24" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="600" fill="white">⭐ 同级最长</text>
    <text x="40" y="70" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">Pro</text>
    <text x="40" y="150" font-family="sans-serif" font-size="80" font-weight="700" fill="white">902</text>
    <text x="40" y="190" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">km</text>
    <text x="40" y="230" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">96.3kWh 磷酸铁锂</text>
    <text x="40" y="260" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">+72km | 首破900km</text>
  </g>
  
  <g transform="translate(844, 140)">
    <rect x="0" y="0" width="370" height="280" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">Max</text>
    <text x="40" y="130" font-family="sans-serif" font-size="72" font-weight="700" fill="white">835</text>
    <text x="40" y="170" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">km</text>
    <text x="40" y="210" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">101.7kWh 三元锂</text>
    <text x="40" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">+35km vs 老款</text>
  </g>
  
  <!-- Energy efficiency -->
  <g transform="translate(64, 460)">
    <rect x="0" y="0" width="1152" height="100" rx="20" fill="url(#card-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="40" y="35" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#FFB366" font-weight="600">能耗表现</text>
    <text x="40" y="70" font-family="sans-serif" font-size="28" font-weight="700" fill="white">11.7 kWh/100km | 能量效率 94%</text>
  </g>
  
  <text x="1216" y="690" text-anchor="end" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">06</text>
</svg>