<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6900"/>
      <stop offset="50%" style="stop-color:#FF8533"/>
      <stop offset="100%" style="stop-color:#FF6900"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB366;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#FFB366;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFB366;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#hero-bg)"/>
  
  <!-- Subtle grid pattern -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="720"/>
    <line x1="256" y1="0" x2="256" y2="720"/>
    <line x1="384" y1="0" x2="384" y2="720"/>
    <line x1="512" y1="0" x2="512" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="768" y1="0" x2="768" y2="720"/>
    <line x1="896" y1="0" x2="896" y2="720"/>
    <line x1="1024" y1="0" x2="1024" y2="720"/>
    <line x1="1152" y1="0" x2="1152" y2="720"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
  </g>
  
  <!-- Accent glow line -->
  <rect x="0" y="350" width="1280" height="2" fill="url(#accent-glow)"/>
  
  <!-- Thank you text -->
  <text x="640" y="260" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="80" font-weight="700" fill="white" letter-spacing="8">
    谢谢观看
  </text>
  
  <!-- Product name -->
  <text x="640" y="340" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="36" fill="rgba(255,255,255,0.9)">
    新一代小米SU7
  </text>
  
  <!-- Tagline -->
  <text x="640" y="400" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">
    更好看 · 更好开 · 更智能 · 更安全
  </text>
  
  <!-- Xiaomi logo -->
  <rect x="600" y="460" width="80" height="80" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="640" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="white">Mi</text>
  
  <!-- Bottom info -->
  <rect x="0" y="660" width="1280" height="60" fill="rgba(0,0,0,0.2)"/>
  <text x="640" y="695" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">
    21.99万元起 | 新一代驾驶者之车
  </text>
</svg>